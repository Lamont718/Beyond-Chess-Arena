<!doctype html>
<html>
<head><meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;}
  *{box-sizing:border-box;}
  /* Full-bleed square (no rounding/transparency) — Android applies its own mask.
     Knight kept inside the central ~64% safe zone. */
  .tile{
    width:512px;height:512px;position:relative;overflow:hidden;
    background:
      radial-gradient(120% 120% at 18% 8%, rgba(255,201,77,.18), transparent 55%),
      radial-gradient(120% 120% at 100% 100%, rgba(51,204,163,.15), transparent 55%),
      linear-gradient(150deg,#27365a 0%,#1a2435 55%,#121a29 100%);
    display:flex;align-items:center;justify-content:center;
  }
  .knight{
    font-family:"Segoe UI Symbol","Segoe UI Emoji",system-ui,sans-serif;
    font-size:288px;line-height:1;
    background:linear-gradient(180deg,#ffe08a 0%,#ffc94d 55%,#f0a92c 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 12px 30px rgba(0,0,0,.45);
  }
</style></head>
<body>
  <div class="tile"><div class="knight">&#9822;</div></div>
</body>
</html>
