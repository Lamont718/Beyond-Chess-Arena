<!doctype html>
<html>
<head><meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;}
  *{box-sizing:border-box;}
  /* Full-bleed square (no transparency) — iOS applies its own rounding. */
  .tile{
    width:512px;height:512px;position:relative;overflow:hidden;
    background:
      radial-gradient(120% 120% at 18% 8%, rgba(255,201,77,.20), transparent 55%),
      radial-gradient(120% 120% at 100% 100%, rgba(51,204,163,.16), transparent 55%),
      linear-gradient(150deg,#27365a 0%,#1a2435 55%,#121a29 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:"Segoe UI",system-ui,sans-serif;
  }
  .knight{
    font-family:"Segoe UI Symbol","Segoe UI Emoji",system-ui,sans-serif;
    font-size:300px;line-height:1;margin-top:-14px;
    background:linear-gradient(180deg,#ffe08a 0%,#ffc94d 55%,#f0a92c 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 10px 26px rgba(0,0,0,.45);
  }
  .word{
    margin-top:6px;font-weight:800;letter-spacing:.30em;
    font-size:62px;color:#ffc94d;
    text-shadow:0 3px 10px rgba(0,0,0,.4);
    padding-left:.30em;
  }
</style></head>
<body>
  <div class="tile">
    <div class="knight">&#9822;</div>
    <div class="word">ARENA</div>
  </div>
</body>
</html>
